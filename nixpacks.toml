[phases.setup]
nixPkgs = ["php84", "php84.pdo", "php84.mbstring", "php84.pdo_mysql", "php84.tokenizer", "php84.xml", "php84.ctype", "php84.json", "php84.curl", "php84.fileinfo", "php84.bcmath", "php84.gd", "nodejs_latest"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = [
    "php artisan storage:link",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
